<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>OWASP Web Scanner</title>
</head>
<body>

    <h1>OWASP Web Scanner</h1>

    <form method="POST">

        <input
            type="text"
            name="url"
            placeholder="주소를 입력하세요"
            style="width:400px">

        <button type="submit">
            Scan
        </button>

    </form>

    <hr>

    <h2>수집된 링크</h2>

    {% for link in links %}
        <p>{{ link }}</p>
    {% endfor %}

</body>
</html>
